<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JSL Flashcards</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#D93A2B">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  :root{
    --paper:#FBFAF6;
    --paper-2:#F3F1E9;
    --ink:#1C1B19;
    --ink-soft:#6B6862;
    --ink-faint:#9C988E;
    --line:#E4E0D6;
    --shu:#D93A2B;
    --shu-deep:#B32C20;
    --radius:18px;
    --jp-mincho:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP","Noto Serif CJK JP",serif;
    --jp-gothic:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP","Noto Sans CJK JP",Meiryo,sans-serif;
    --latin:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--latin);
    display:flex;justify-content:center;
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
  }
  .app{width:100%;max-width:460px;display:flex;flex-direction:column;min-height:100dvh}

  /* ---- header ---- */
  header{display:flex;align-items:center;gap:12px;padding:20px 2px 16px}
  .seal{
    width:40px;height:40px;flex-shrink:0;border-radius:11px;
    background:var(--shu);color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--jp-mincho);font-size:24px;font-weight:700;
    box-shadow:0 1px 0 rgba(0,0,0,.06);
  }
  .titles{display:flex;flex-direction:column;line-height:1.15}
  .titles .en{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .titles .jp{font-family:var(--jp-gothic);font-size:19px;font-weight:600;letter-spacing:.02em}

  /* ---- deck tabs ---- */
  .decks{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 14px;scrollbar-width:none}
  .decks::-webkit-scrollbar{display:none}
  .deck-pill{
    flex:0 0 auto;border:1px solid var(--line);background:transparent;
    color:var(--ink-soft);font-family:var(--latin);font-size:13px;font-weight:500;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s;
  }
  .deck-pill .n{color:var(--ink-faint);font-size:11px;margin-left:5px}
  .deck-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .deck-pill.active .n{color:rgba(251,250,246,.6)}

  /* ---- card ---- */
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 0 4px}
  .card{
    position:relative;width:100%;aspect-ratio:3/4;max-height:52dvh;
    cursor:pointer;perspective:1400px;margin:0 auto;
  }
  .card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
  .card.flipped .card-inner{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(28,27,25,.04),0 10px 30px -12px rgba(28,27,25,.14);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 24px;text-align:center;
  }
  .face .corner{
    position:absolute;top:14px;right:14px;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:700;
  }
  /* front: faint genko-yoshi center rule */
  .front{background:
    linear-gradient(#fff,#fff) padding-box;}
  .front::before{
    content:"";position:absolute;left:50%;top:22%;bottom:22%;width:1px;
    background:repeating-linear-gradient(var(--line) 0 6px,transparent 6px 12px);
    opacity:.5;transform:translateX(-50%);
  }
  .jp-text{
    font-family:var(--jp-mincho);font-weight:600;color:var(--ink);
    font-size:clamp(34px,10vw,52px);line-height:1.35;position:relative;z-index:1;
    word-break:break-word;
  }
  .furi{
    margin-top:14px;font-family:var(--jp-gothic);color:var(--shu-deep);
    font-size:clamp(15px,4.4vw,19px);letter-spacing:.04em;position:relative;z-index:1;
    min-height:1.2em;transition:opacity .2s;
  }
  .furi.hidden{opacity:0}
  .back{transform:rotateY(180deg);background:var(--paper-2)}
  .en-text{font-family:var(--latin);font-size:clamp(18px,5.4vw,23px);font-weight:500;line-height:1.4;color:var(--ink)}
  .back .deck-tag{margin-top:16px;font-size:12px;color:var(--ink-faint);letter-spacing:.04em}
  .tap-hint{position:absolute;bottom:16px;left:0;right:0;font-size:11px;color:var(--ink-faint);letter-spacing:.03em}

  /* ---- controls ---- */
  .progress{display:flex;align-items:center;gap:10px;padding:16px 4px 10px}
  .bar{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
  .bar span{display:block;height:100%;background:var(--shu);width:0;transition:width .3s}
  .count{font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums;min-width:52px;text-align:right}

  .controls{display:flex;align-items:center;gap:10px;padding-bottom:6px}
  .nav-btn{
    flex:1;padding:14px;border:1px solid var(--line);background:#fff;border-radius:12px;
    font-family:var(--latin);font-size:15px;font-weight:500;color:var(--ink);cursor:pointer;
    transition:background .12s,border-color .12s;
  }
  .nav-btn:active{background:var(--paper-2)}
  .icon-btn{
    width:48px;height:48px;flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:12px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;
    transition:background .12s,border-color .12s,color .12s;color:var(--ink-soft);
  }
  .icon-btn:active{background:var(--paper-2)}
  .icon-btn.on{background:var(--shu);border-color:var(--shu);color:#fff}

  .foot{padding:12px 4px 2px;text-align:center;font-size:11px;color:var(--ink-faint);letter-spacing:.02em}

  .msg{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:14px;line-height:1.6}
  .msg code{background:var(--paper-2);padding:2px 6px;border-radius:5px;font-size:13px}

  @media (prefers-reduced-motion: reduce){
    .card-inner{transition:none}
    .bar span{transition:none}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="seal" aria-hidden="true">学</div>
    <div class="titles">
      <span class="en">JSL Flashcards</span>
      <span class="jp">日本語 学習カード</span>
    </div>
  </header>

  <nav class="decks" id="decks" aria-label="Decks"></nav>

  <main class="stage" id="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard, tap to flip">
      <div class="card-inner">
        <div class="face front">
          <span class="corner">日本語</span>
          <div class="jp-text" id="jp">—</div>
          <div class="furi" id="furi"></div>
          <span class="tap-hint">tap to reveal</span>
        </div>
        <div class="face back">
          <span class="corner">English</span>
          <div class="en-text" id="en">—</div>
          <div class="deck-tag" id="deckTag"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="progress">
    <div class="bar"><span id="barFill"></span></div>
    <div class="count" id="count">0 / 0</div>
  </div>

  <div class="controls">
    <button class="icon-btn on" id="furiBtn" title="Toggle furigana (f)" aria-label="Toggle furigana">あ</button>
    <button class="nav-btn" id="prevBtn">← Prev</button>
    <button class="nav-btn" id="nextBtn">Next →</button>
    <button class="icon-btn" id="shuffleBtn" title="Shuffle (s)" aria-label="Shuffle deck">⇄</button>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
const state = {
  all: [],
  decks: [],
  deck: null,
  cards: [],
  idx: 0,
  flipped: false,
  showFuri: true,
};

const $ = id => document.getElementById(id);

async function boot(){
  try{
    const res = await fetch('./decks.json', {cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    state.all = (data.cards || []).filter(c => c.jp && c.en);
    if(!state.all.length) throw new Error('empty');
  }catch(err){
    $('stage').innerHTML = `<div class="msg">Couldn't load <code>decks.json</code>.<br><br>
      If you opened this file directly, run it through a local server or the GitHub Pages URL —
      browsers block <code>fetch</code> on <code>file://</code>.<br><br>
      <span style="color:var(--ink-faint)">(${err.message})</span></div>`;
    $('decks').style.display='none';
    document.querySelector('.progress').style.display='none';
    document.querySelector('.controls').style.display='none';
    return;
  }
  state.decks = [...new Set(state.all.map(c => c.deck || 'Cards'))];
  buildDeckTabs();
  selectDeck(state.decks[0]);
  wire();
  registerSW();
}

function buildDeckTabs(){
  const el = $('decks');
  el.innerHTML = state.decks.map(d => {
    const n = state.all.filter(c => (c.deck||'Cards')===d).length;
    return `<button class="deck-pill" data-deck="${d}">${d}<span class="n">${n}</span></button>`;
  }).join('');
  el.querySelectorAll('.deck-pill').forEach(b =>
    b.addEventListener('click', () => selectDeck(b.dataset.deck)));
}

function selectDeck(deck){
  state.deck = deck;
  state.cards = state.all.filter(c => (c.deck||'Cards')===deck);
  state.idx = 0;
  state.flipped = false;
  document.querySelectorAll('.deck-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.deck===deck));
  render();
}

function render(){
  const c = state.cards[state.idx];
  const card = $('card');
  card.classList.remove('flipped');
  state.flipped = false;
  if(!c){ return; }
  $('jp').textContent = c.jp;
  const furi = (c.furigana && c.furigana !== c.jp) ? c.furigana : '';
  $('furi').textContent = furi;
  $('furi').classList.toggle('hidden', !state.showFuri || !furi);
  $('en').textContent = c.en;
  $('deckTag').textContent = c.deck || '';
  $('count').textContent = `${state.idx+1} / ${state.cards.length}`;
  $('barFill').style.width = ((state.idx+1)/state.cards.length*100)+'%';
}

function flip(){ state.flipped = !state.flipped; $('card').classList.toggle('flipped', state.flipped); }
function move(dir){
  if(!state.cards.length) return;
  state.idx = (state.idx + dir + state.cards.length) % state.cards.length;
  render();
}
function shuffle(){
  for(let i=state.cards.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [state.cards[i],state.cards[j]]=[state.cards[j],state.cards[i]];
  }
  state.idx=0; render();
}
function toggleFuri(){
  state.showFuri = !state.showFuri;
  $('furiBtn').classList.toggle('on', state.showFuri);
  render();
}

function wire(){
  const card = $('card');
  card.addEventListener('click', flip);
  card.addEventListener('keydown', e=>{
    if(e.key===' '||e.key==='Enter'){ e.preventDefault(); flip(); }
  });
  $('prevBtn').addEventListener('click', ()=>move(-1));
  $('nextBtn').addEventListener('click', ()=>move(1));
  $('shuffleBtn').addEventListener('click', shuffle);
  $('furiBtn').addEventListener('click', toggleFuri);

  document.addEventListener('keydown', e=>{
    if(e.target.tagName==='BUTTON' && (e.key===' '||e.key==='Enter')) return;
    if(e.key==='ArrowLeft') move(-1);
    else if(e.key==='ArrowRight') move(1);
    else if(e.key==='f'||e.key==='F') toggleFuri();
    else if(e.key==='s'||e.key==='S') shuffle();
    else if(e.key===' '){ e.preventDefault(); flip(); }
  });

  // swipe: horizontal = prev/next, tap = flip (handled by click)
  let x0=null,y0=null,t0=0;
  card.addEventListener('touchstart', e=>{
    const t=e.changedTouches[0]; x0=t.clientX; y0=t.clientY; t0=Date.now();
  },{passive:true});
  card.addEventListener('touchend', e=>{
    if(x0===null) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.4){
      // it's a swipe — suppress the click-flip
      e.preventDefault();
      move(dx<0 ? 1 : -1);
    }
    x0=y0=null;
  });
}

function registerSW(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  const foot = $('foot');
  foot.textContent = `${state.all.length} cards · works offline once loaded`;
}

boot();
</script>
</body>
</html>
